<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuẩn bị Tết</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 450px;
            background-color: white;
            margin-top: 50px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #c92a2a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .header h2 {
            margin: 0;
            font-size: 22px;
        }
        .header p {
            margin: 5px 0 0;
            font-size: 14px;
        }
        #todo-list {
            list-style-type: none;
            padding: 20px;
            margin: 0;
        }
        .todo-item {
            border: 1px solid #f4c28d;
            background-color: #fffcf5;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-name {
            font-weight: bold;
            color: #333;
        }
        .task-status {
            color: #d4a373;
            font-size: 14px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h2>Chuẩn bị Tết Nguyên Đán</h2>
            <p>Danh sách việc cần làm</p>
        </div>
        
        <ul id="todo-list"></ul>
    </div>

    <script src="b1s17.js"></script>
</body>
</html>
