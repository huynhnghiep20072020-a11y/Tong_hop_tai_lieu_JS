<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công việc chuẩn bị Tết</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }
        .container {
            width: 450px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #d32f2f;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .header h2 {
            margin: 0 0 5px 0;
            font-size: 22px;
        }
        .header p {
            margin: 0;
            font-size: 14px;
        }
        .todo-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .todo-item {
            padding: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            user-select: none;
            font-size: 15px;
            transition: 0.2s;
        }
        .todo-item.pending {
            background-color: #fffde7;
            border: 1px solid #ffcc80;
            color: #555;
        }
        .todo-item.completed {
            background-color: #e8f5e9;
            border: 1px solid #81c784;
            color: #2e7d32;
        }
        .icon {
            font-size: 18px;
            font-weight: bold;
        }
        .pending .icon {
            color: #ffb74d;
        }
        .completed .icon {
            color: #4caf50;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Công việc chuẩn bị Tết</h2>
            <p>Click để đánh dấu hoàn thành</p>
        </div>
        
        <div class="todo-list" id="todo-list"></div>

        <div class="footer">
            Trạng thái được lưu tự động vào localStorage • Refresh để kiểm tra
        </div>
    </div>

    <script src="b2s17.js"></script>

</body>
</html>
