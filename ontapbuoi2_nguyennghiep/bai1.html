<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1 - Toggle Nút</title>
    <style>
        #myButton {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: green;
            color: white;
        }
    </style>
</head>
<body>

    <button id="myButton">Bật</button>

    <script>
        const myButton = document.querySelector('#myButton');

        myButton.addEventListener('click', function() {
            if (myButton.innerText === 'Bật') {
                myButton.innerText = 'Tắt';
                myButton.style.backgroundColor = 'red';
            } else {
                myButton.innerText = 'Bật';
                myButton.style.backgroundColor = 'green';
            }
        });
    </script>

</body>
</html>
