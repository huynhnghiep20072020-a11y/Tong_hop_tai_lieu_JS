<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e8f5e9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; width: 100%; max-width: 900px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .header { background-color: #4CAF50; color: #ffffff; text-align: center; padding: 20px; }
        .header h1 { margin: 0; font-size: 24px; }
        .content { padding: 20px 30px; }
        h2 { color: #4CAF50; font-size: 18px; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; margin-top: 0; }
        .error-msg { color: #f44336; background-color: #ffebee; padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; font-weight: bold; text-align: center; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #333; }
        .form-group label span { color: #f44336; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none; font-family: inherit; }
        .form-group input:focus { border-color: #4CAF50; }
        
        .button-group { display: flex; gap: 10px; }
        .btn-submit { flex: 1; background-color: #4CAF50; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-cancel { flex: 1; background-color: #9e9e9e; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-submit:hover { background-color: #43a047; }
        
        .list-section { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border: 1px solid #e0e0e0; font-size: 14px; }
        th { background-color: #4CAF50; color: white; text-transform: uppercase; font-size: 13px; }
        td { color: #333; }
        
        .action-btns button { padding: 6px 12px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }
        .edit-btn { background-color: #2196F3; margin-right: 5px; }
        .delete-btn { background-color: #f44336; }
        
        .footer { text-align: center; margin-top: 20px; padding: 15px; color: #4CAF50; font-weight: bold; font-style: italic; border-top: 1px solid #e8f5e9; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>👥 Quản Lý Nhân Viên</h1>
        </div>
        
        <div class="content">
            <h2 id="form-title">Thêm Nhân Viên Mới</h2>
            <div id="error-message" class="error-msg"></div>
            
            <form id="employee-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Họ và Tên <span>*</span></label>
                        <input type="text" id="emp-name" placeholder="Nhập họ và tên...">
                    </div>
                    <div class="form-group">
                        <label>Ngày Sinh <span>*</span></label>
                        <input type="date" id="emp-dob">
                    </div>
                    <div class="form-group">
                        <label>Email <span>*</span></label>
                        <input type="text" id="emp-email" placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label>Địa Chỉ <span>*</span></label>
                        <input type="text" id="emp-address" placeholder="Nhập địa chỉ...">
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-submit" id="submit-btn">➕ Thêm Nhân Viên</button>
                    <button type="button" class="btn-cancel" id="cancel-btn" style="display: none;">✖ Hủy</button>
                </div>
            </form>

            <div class="list-section">
                <h2>Danh Sách Nhân Viên</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Họ và tên</th>
                            <th>Ngày sinh</th>
                            <th>Email</th>
                            <th>Địa chỉ</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="employee-list">
                    </tbody>
                </table>
            </div>
            
            <div class="footer">
                Tổng số nhân viên: <span id="employee-count">0</span>
            </div>
        </div>
    </div>

    <script src="minip.js"></script>
</body>
</html>
