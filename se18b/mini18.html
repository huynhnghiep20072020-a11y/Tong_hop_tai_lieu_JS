<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Sản Phẩm</title>
    <link rel="stylesheet" href="mini18.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        
        <header class="app-header">
            <h1><i class="fas fa-box-open"></i> Hệ Thống Quản Lý Sản Phẩm</h1>
            <p>Lưu trữ và quản lý dữ liệu an toàn với LocalStorage</p>
        </header>

        <section class="form-section">
            <h2 class="section-title" id="form-title">Thêm Sản Phẩm Mới</h2>
            <form id="product-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Tên sản phẩm <span class="required">*</span></label>
                        <input type="text" id="name" placeholder="Nhập tên sản phẩm..." required>
                    </div>

                    <div class="form-group">
                        <label for="category">Danh mục <span class="required">*</span></label>
                        <select id="category" required>
                            <option value="">-- Chọn danh mục --</option>
                            <option value="Điện tử">Điện tử</option>
                            <option value="Thời trang">Thời trang</option>
                            <option value="Thực phẩm">Thực phẩm</option>
                            <option value="Đồ gia dụng">Đồ gia dụng</option>
                            <option value="Sách">Sách</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="price">Giá (VNĐ) <span class="required">*</span></label>
                        <input type="number" id="price" min="0" placeholder="0" required>
                    </div>

                    <div class="form-group">
                        <label for="quantity">Số lượng <span class="required">*</span></label>
                        <input type="number" id="quantity" min="0" placeholder="0" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Mô tả</label>
                        <textarea id="description" rows="3" placeholder="Nhập mô tả sản phẩm (tùy chọn)..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-submit">
                        <i class="fas fa-plus-circle"></i> <span>Thêm Sản Phẩm</span>
                    </button>
                    <button type="button" class="btn btn-secondary hidden" id="btn-cancel">
                        <i class="fas fa-times-circle"></i> Hủy
                    </button>
                    <button type="button" class="btn btn-danger" id="btn-delete-all">
                        <i class="fas fa-trash-alt"></i> Xóa Tất Cả
                    </button>
                </div>
            </form>
        </section>

        <section class="filter-section">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm theo tên hoặc mô tả...">
            </div>
            <div class="filter-wrapper">
                <select id="filter-category">
                    <option value="all">Tất cả danh mục</option>
                    <option value="Điện tử">Điện tử</option>
                    <option value="Thời trang">Thời trang</option>
                    <option value="Thực phẩm">Thực phẩm</option>
                    <option value="Đồ gia dụng">Đồ gia dụng</option>
                    <option value="Sách">Sách</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
        </section>

        <section class="table-section">
            <div class="table-responsive">
                <table id="product-table">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th>Tên Sản Phẩm</th>
                            <th>Danh Mục</th>
                            <th>Giá</th>
                            <th>Số Lượng</th>
                            <th class="col-desc">Mô Tả</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>

            <div id="empty-state" class="empty-state">
                <i class="fas fa-box-open"></i>
                <h3>Chưa có sản phẩm nào!</h3>
                <p>Hãy thêm sản phẩm mới để bắt đầu quản lý.</p>
            </div>
        </section>

        <footer class="app-footer">
            <div class="stat-box">
                <p>Tổng sản phẩm</p>
                <h3 id="stat-total-products">0</h3>
            </div>
            <div class="stat-box">
                <p>Tổng giá trị</p>
                <h3 id="stat-total-value">0 đ</h3>
            </div>
            <div class="stat-box">
                <p>Tổng số lượng tồn</p>
                <h3 id="stat-total-quantity">0</h3>
            </div>
        </footer>

    </div>

    <script src="mini18.js"></script>
</body>
</html>
